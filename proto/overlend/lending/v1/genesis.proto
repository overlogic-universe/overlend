syntax = "proto3";

package overlend.lending.v1;

import "gogoproto/gogo.proto";
import "cosmos_proto/cosmos.proto"; 


import "overlend/lending/v1/lending.proto";
import "overlend/lending/v1/params.proto";

option go_package = "github.com/overlogic-universe/overlend/x/lending/types";

// GenesisState, state awal/genesis module lending
message GenesisState {
  // global params
  Params params = 1;

  // semua markets (0x01 | denom)
  repeated Market markets = 2;

  // user collateral (0x02 | address | denom)
  repeated UserCollateral user_collaterals = 3;

  // user debt (0x03 | address | denom)
  repeated UserDebt user_debts = 4;

  // market accounting state (index, totals)
  repeated MarketState market_states = 5;
}