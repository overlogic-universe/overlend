syntax = "proto3";

package overlend.lending.v1;

import "gogoproto/gogo.proto";
import "cosmos_proto/cosmos.proto"; 

option go_package = "github.com/overlogic-universe/overlend/x/lending/types";

// EventParamsUpdated diemit saat params diupdate
message EventParamsUpdated {
    uint64 max_markets = 1;
    uint64 max_collateral_assets_per_user = 2;
    bool liquidation_enabled = 3;

    string oracle_staleness_limit = 4 [(gogoproto.customtype) = "cosmossdk.io/math.Int"];
    string max_price_deviation = 5 [(gogoproto.customtype) = "cosmossdk.io/math.LegacyDec"];
    bool emergency_pause = 6;
    bool oracle_enabled = 7;
}

// EventDepositCollateral diemit saat user setor collateral
message EventDepositCollateral {
    string sender = 1 [(cosmos_proto.scalar) = "cosmos.AddressString"];
    string denom = 2;
    string amount = 3 [(gogoproto.customtype) = "cosmossdk.io/math.Int"];
}

// EventDepositCollateral diemit saat user tarik collateral
message EventWithdrawCollateral {
    string sender = 1 [(cosmos_proto.scalar) = "cosmos.AddressString"];
    string denom = 2;
    string amount = 3 [(gogoproto.customtype) = "cosmossdk.io/math.Int"];
}

// EventBorrow diemit saat user meminjam asset
message EventBorrow {
    string borrower = 1 [(cosmos_proto.scalar) = "cosmos.AddressString"];
    string denom = 2;
    string amount = 3 [(gogoproto.customtype) = "cosmossdk.io/math.Int"];

    // total utang terupdate setelah peminjaman
    string new_total_debt = 4 [(gogoproto.customtype) = "cosmossdk.io/math.Int"];
}

// EventRepay diemit saat user repays debt
message EventRepay {
    string borrower = 1 [(cosmos_proto.scalar) = "cosmos.AddressString"];
    string denom = 2;
    string amount = 3 [(gogoproto.customtype) = "cosmossdk.io/math.Int"];

    //    total utang terupdate setelah repay
    string remaining_debt = 4 [(gogoproto.customtype) = "cosmossdk.io/math.Int"];
}

// EventLiquidate diemit saat likuidasi terjadi
message EventLiquidate {
    string liquidator = 1 [(cosmos_proto.scalar) = "cosmos.AddressString"];
    string borrower = 2 [(cosmos_proto.scalar) = "cosmos.AddressString"];

    string repay_denom = 3;
    string collateral_denom = 4;

    string repay_amount = 5 [(gogoproto.customtype) = "cosmossdk.io/math.Int"];
    string collateral_seized = 6 [(gogoproto.customtype) = "cosmossdk.io/math.Int"];

    // protocol biaya opsional yang diambil
    string protocol_fee = 7 [(gogoproto.customtype) = "cosmossdk.io/math.Int"];
}

// EventMarketUpdated diemit saat market config changes
message EventMarketUpdated {
    string denom = 1;

    string ltv = 2 [(gogoproto.customtype) = "cosmossdk.io/math.LegacyDec"];
    string liquidation_threshold = 3 [(gogoproto.customtype) = "cosmossdk.io/math.LegacyDec"];
    string liquidation_bonus = 4 [(gogoproto.customtype) = "cosmossdk.io/math.LegacyDec"];
    string reserve_factor = 5 [(gogoproto.customtype) = "cosmossdk.io/math.LegacyDec"];
    string close_factor = 6 [(gogoproto.customtype) = "cosmossdk.io/math.LegacyDec"];

    bool is_enabled = 7;
    string borrow_cap = 8 [(gogoproto.customtype) = "cosmossdk.io/math.Int"];
    string supply_cap = 9 [(gogoproto.customtype) = "cosmossdk.io/math.Int"];
    uint32 risk_tier = 10;
}

// EventInterestAccrued diemit saat index bunga terupdate
message EventInterestAccrued {
    string denom = 1;

    string borrow_index = 2 [(gogoproto.customtype) = "cosmossdk.io/math.LegacyDec"];
    string supply_index = 3 [(gogoproto.customtype) = "cosmossdk.io/math.LegacyDec"];

    int64 block_height = 4;
}
